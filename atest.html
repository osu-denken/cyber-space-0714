<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin-top: 20px;
        }
        canvas {
            border: 2px solid #000;
            background: #f0f0f0;
            display: block;
            margin: 10px auto;
        }
        .instructions {
            margin-top: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Snake Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="instructions">
        Use Arrow Keys to move. Press 'R' to restart.
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const gridWidth = canvas.width / gridSize;
        const gridHeight = canvas.height / gridSize;

        // Game state
        let snake = [[10, 10]]; // Snake segments [x, y]
        let direction = 'right';
        let food = [5, 5];
        let score = 0;
        let gameLoopInterval;

        // Generate food at random position (not on snake)
        function generateFood() {
            let newFood;
            do {
                newFood = [
                    Math.floor(Math.random() * gridWidth),
                    Math.floor(Math.random() * gridHeight)
                ];
            } while (snake.some(segment =>
                segment[0] === newFood[0] && segment[1] === newFood[1]
            ));
            food = newFood;
        }

        // Game over logic
        function gameOver() {
            clearInterval(gameLoopInterval);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
            ctx.font = '20px Arial';
            ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 40);
        }

        // Main game loop
        function gameLoop() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Calculate new head position
            const head = snake[0];
            let newHead;
            switch (direction) {
                case 'right': newHead = [head[0] + 1, head[1]]; break;
                case 'left': newHead = [head[0] - 1, head[1]]; break;
                case 'up': newHead = [head[0], head[1] - 1]; break;
                case 'down': newHead = [head[0], head[1] + 1]; break;
            }

            // Wall collision
            if (newHead[0] < 0 || newHead[0] >= gridWidth ||
                newHead[1] < 0 || newHead[1] >= gridHeight) {
                gameOver();
                return;
            }

            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (snake[i][0] === newHead[0] && snake[i][1] === newHead[1]) {
                    gameOver();
                    return;
                }
            }

            // Food collision
            if (newHead[0] === food[0] && newHead[1] === food[1]) {
                snake.unshift(newHead);
                generateFood();
                score++;
            } else {
                snake.unshift(newHead);
                snake.pop();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? 'darkgreen' : 'green';
                ctx.fillRect(segment[0] * gridSize, segment[1] * gridSize, gridSize - 2, gridSize - 2);
            });

            // Draw food
            ctx.fillStyle = 'red';
            ctx.fillRect(food[0] * gridSize, food[1] * gridSize, gridSize - 2, gridSize - 2);

            // Draw score
            ctx.fillStyle = 'black';
            ctx.font = '16px Arial';
            ctx.fillText(`Score: ${score}`, 10, 20);
        }

        // Initialize game
        function init() {
            snake = [[10, 10]];
            direction = 'right';
            score = 0;
            generateFood();
            clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(gameLoop, 100);
        }

        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                init();
            }
            switch (e.key) {
                case 'ArrowUp': if (direction !== 'down') direction = 'up'; break;
                case 'ArrowDown': if (direction !== 'up') direction = 'down'; break;
                case 'ArrowLeft': if (direction !== 'right') direction = 'left'; break;
                case 'ArrowRight': if (direction !== 'left') direction = 'right'; break;
            }
        });

        // Start the game
        init();
    </script>
</body>
</html>
